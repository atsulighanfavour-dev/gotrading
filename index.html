<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gotrading: Home</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
     <link rel="stylesheet" href="css/header.css">
     <link rel="stylesheet" href="css/img-slide.css">
      <script src="js/header.js" defer ></script>
      <script src="js/img-slide.js" defer></script>
  </head>
  <body style="height: 10000px" >
    <header>
      <!--Top-Bar-->
      <div id="top-bar" class="top-bar">
        <div class="top-left">
          <div class="font-icon">
            <i class="fa-solid fa-location-dot"></i>
          </div>
          <h4 class="header">Address</h4>
          <p class="para">9413 Highfield Road BOURNEMOUTH BH28 8RC</p>
        </div>
        <div class="top-center">
          <div class="font-icon">
            <i class="fa-solid fa-envelope"></i>
          </div>
          <h4 class="header">Email</h4>
          <p class="para">support@Gotrading.com</p>
        </div>
        <div class="top-right">
          <ul class="social-media">
            <i class="fa-brands fa-facebook-f"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-pinterest"></i>
            <i class="fa-brands fa-linkedin-in"></i>
            <i class="fa-brands fa-google-plus-g"></i>
          </ul>
        </div>
      </div>
      <!--Bottom-Bar-->
      <div id="bottom-bar" class="bottom-bar">
        <div class="bottom-left">
          <img class="img-logo" src="images/logo.png" />
        </div>
        <div class="bottom-right">
         
          <nav id="nav-bar" class="nav-bar">
             <button id="open-nav" class="open-nav">
            <i class="fa-solid fa-bars"></i>
          </button>
            <button id="close-nav" class="close-nav">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <ul class="nav-section">
              <li>
                <a href="#">Home</a>
              </li>
              <li class="dropdown">
                <a href="#" class="dropdown-toggle">Company &gt;</a>
                <ul class="dropdown-menu">
                  <li>
                    <a href="#" class="more-link">About Us</a>
                  </li>
                  <li>
                    <a href="#" class="more-link">Team</a>
                  </li>
                  <li>
                    <a href="#" class="more-link">Our Policies</a>
                  </li>
                </ul>
              </li>
              <li class="dropdown">
                <a href="#" class="dropdown-toggle">Associate &gt;</a>
                <ul class="dropdown-menu">
                  <li>
                    <a href="#" class="more-link">Real Estate</a>
                  </li>
                  <li>
                    <a href="#" class="more-link">Gold Mining</a>
                  </li>
                  <li>
                    <a href="#" class="more-link">Carbon Emmission</a>
                  </li>
                </ul>
              </li>
              <li>
                <a href="#">Cryto-Currencies</a>
              </li>
              <li>
                <a href="#">Login</a>
              </li>
              <li>
                <a href="#">Contact Us</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <section id="slides-images content">
      <div class="bg-container">
         <div class="bg">
          <img class="img-bg" src="images/download.png">
        </div>
        
        <div class="bg-content">
           <h1 id="img-title"></h1>
           <p id="img-text"></p>
           <div class="explore"></div>
        </div>
      </div>
    </section>
  </body>
</html>
